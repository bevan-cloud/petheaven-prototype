name: Sync Notion → Staging

# Runs automatically at midnight UTC every day.
# Also runs instantly when the ↻ button is clicked on any staging page.

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC daily  (02:00 SAST)
  workflow_dispatch:        # manual trigger via staging page button

permissions:
  contents: write           # needed to commit + push notion-data.js

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Pull latest Notion data → rewrites staging/notion-data.js
      # and cache-busts the ?v= query string in all 3 staging pages
      - name: Sync Notion → notion-data.js
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node sync-notion.js

      # Sets the Refernce (staging URL) on any newly added Notion items
      # that don't have it yet. Skips items that are already set — safe to re-run.
      - name: Backfill staging URLs on new items
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node update-briefs.js

      # Commit and push only if something actually changed
      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add staging/
          if git diff --staged --quiet; then
            echo "✓ No changes — Notion data is already up to date."
          else
            git commit -m "chore: auto-sync Notion data [skip ci]"
            git push
            echo "✓ Changes committed and pushed."
          fi
