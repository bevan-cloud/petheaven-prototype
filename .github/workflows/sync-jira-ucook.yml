name: Sync Jira Sprint Data — UCook

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1-5'   # weekdays at 6am UTC (8am SAST)

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync UCook Jira sprint data
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          COMPANY: ucook
        run: node sync-jira.js

      - name: Commit updated sprint data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ucook/jira-sprint-data.js
          git diff --staged --quiet || git commit -m "chore: sync UCook Jira sprint data [skip ci]"
          git push
