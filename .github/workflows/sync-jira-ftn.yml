name: Sync Jira Sprint Data — Faithful to Nature

on:
  workflow_dispatch:
  schedule:
    - cron: '15 6 * * 1-5'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test Jira credentials
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          echo "Testing Jira API connectivity..."
          STATUS=$(curl -s -o /tmp/jira_test.json -w "%{http_code}" \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Accept: application/json" \
            "https://silvertree-holdings-dev.atlassian.net/rest/api/3/myself")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Jira credentials OK — logged in as: $(cat /tmp/jira_test.json | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>console.log(JSON.parse(d).displayName))')"
          else
            echo "❌ Jira auth failed — response:"
            cat /tmp/jira_test.json
            exit 1
          fi

      - name: Sync FTN Jira sprint data
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          COMPANY: faithful-to-nature
        run: node sync-jira.js

      - name: Commit updated sprint data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add faithful-to-nature/jira-sprint-data.js
          git diff --staged --quiet || git commit -m "chore: sync FTN Jira sprint data [skip ci]"
          git pull --rebase origin main
          git push
